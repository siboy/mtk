version: '3.8'

services:
  mtk-app:
    build:
      context: ..
      dockerfile: setup/Dockerfile
    image: mtk-app:latest
    ports:
      - "80:80"
    environment:
      - user_databoks=mtk_user
      - pass_databoks=mtk_password
      - host_databoks=mysql
      - port_databoks=3306
      - database_dev=mtk_db
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mysql
      - redis
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: mtk_password
      MYSQL_DATABASE: mtk_db
      MYSQL_USER: mtk_user
      MYSQL_PASSWORD: mtk_password
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data: